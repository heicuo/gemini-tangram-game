<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格点七巧板游戏 - 教室优化版</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f4f8;
            --grid-color: #ccc;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; color: #333; font-size: 24px; }

        /* 游戏画布区 - 保持在上方 */
        #game-canvas {
            border: 2px solid #333;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            cursor: grab;
            border-radius: 4px;
        }

        /* 按钮控制区 - 挪移到下方 */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        button {
            padding: 15px 10px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #357abd;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button.reset { background-color: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        button.next { background-color: #2ecc71; box-shadow: 0 4px 0 #27ae60; }

        .hint {
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>格点七巧板</h1>
        
        <canvas id="game-canvas" width="400" height="400"></canvas>

        <div class="controls">
            <button onclick="rotate(-45)">左转 ↺</button>
            <button onclick="rotate(45)">右转 ↻</button>
            <button onclick="flipH()">水平翻转</button>
            <button onclick="flipV()">垂直翻转</button>
            <button class="reset" onclick="resetPieces()">重置位置</button>
            <button class="next" onclick="nextLevel()">下一关</button>
        </div>

        <div class="hint">提示：点击选中色块，拖动移动。按钮在下方方便小朋友操作。</div>
    </div>

    <script>
        // 核心功能逻辑（保持原网页逻辑一致性）
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 40;
        
        // 七巧板零件初始数据
        let pieces = [
            { id: 1, color: '#FF6B6B', points: [[0,0], [4,0], [2,2]], x: 40, y: 40, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 2, color: '#4ECDC4', points: [[0,0], [4,0], [2,2]], x: 200, y: 40, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 3, color: '#FFE66D', points: [[0,0], [2,0], [1,1]], x: 40, y: 200, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 4, color: '#6A5ACD', points: [[0,0], [2,2], [0,4]], x: 120, y: 200, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 5, color: '#FF9F43', points: [[0,0], [2,0], [2,2], [0,2]], x: 240, y: 200, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 6, color: '#54A0FF', points: [[0,0], [2,0], [3,1], [1,1]], x: 40, y: 300, rot: 0, scaleX: 1, scaleY: 1 },
            { id: 7, color: '#5F27CD', points: [[0,2], [2,0], [4,2]], x: 200, y: 300, rot: 0, scaleX: 1, scaleY: 1 }
        ];

        let selectedPiece = null;
        let isDragging = false;
        let offsetX, offsetY;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 绘制网格辅助点 (可选)
            
            pieces.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.scale(p.scaleX, p.scaleY);
                
                if (p === selectedPiece) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "black";
                }

                ctx.beginPath();
                ctx.moveTo(p.points[0][0] * gridSize / 2, p.points[0][1] * gridSize / 2);
                for(let i=1; i<p.points.length; i++) {
                    ctx.lineTo(p.points[i][0] * gridSize / 2, p.points[i][1] * gridSize / 2);
                }
                ctx.closePath();
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            });
        }

        // 交互逻辑
        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 倒序检测，优先选中最上层的
            for (let i = pieces.length - 1; i >= 0; i--) {
                const p = pieces[i];
                // 简单的碰撞检测逻辑（实际可根据Path2D更精确）
                if (mouseX > p.x - 50 && mouseX < p.x + 50 && mouseY > p.y - 50 && mouseY < p.y + 50) {
                    selectedPiece = p;
                    // 置顶
                    pieces.splice(i, 1);
                    pieces.push(p);
                    isDragging = true;
                    offsetX = mouseX - p.x;
                    offsetY = mouseY - p.y;
                    break;
                }
            }
            draw();
        };

        window.onmousemove = (e) => {
            if (isDragging && selectedPiece) {
                const rect = canvas.getBoundingClientRect();
                selectedPiece.x = e.clientX - rect.left - offsetX;
                selectedPiece.y = e.clientY - rect.top - offsetY;
                draw();
            }
        };

        window.onmouseup = () => {
            if (isDragging && selectedPiece) {
                // 吸附到格点
                selectedPiece.x = Math.round(selectedPiece.x / (gridSize/2)) * (gridSize/2);
                selectedPiece.y = Math.round(selectedPiece.y / (gridSize/2)) * (gridSize/2);
            }
            isDragging = false;
            draw();
        };

        // 按钮功能函数
        window.rotate = (deg) => {
            if (selectedPiece) {
                selectedPiece.rot = (selectedPiece.rot + deg) % 360;
                draw();
            }
        };

        window.flipH = () => {
            if (selectedPiece) {
                selectedPiece.scaleX *= -1;
                draw();
            }
        };

        window.flipV = () => {
            if (selectedPiece) {
                selectedPiece.scaleY *= -1;
                draw();
            }
        };

        window.resetPieces = () => {
            location.reload();
        };

        window.nextLevel = () => {
            alert("恭喜完成！准备进入下一关（演示功能）");
            resetPieces();
        };

        // 适配触摸屏 (教室大屏必备)
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousedown", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, false);

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousemove", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            window.dispatchEvent(mouseEvent);
        }, false);

        window.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent("mouseup", {});
            window.dispatchEvent(mouseEvent);
        }, false);

        draw();
    </script>
</body>
</html>
